  <text x="425" y="88" text-anchor="middle" fill="#e6edf3" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="650">Hi, I'm Matt</text>
  <text x="425" y="124" text-anchor="middle" fill="#8b949e" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="17">Python · firmware · split keyboards</text>
